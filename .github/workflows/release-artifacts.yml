name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build and attest release archive
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false
      - name: Install locked dependencies
        run: npm ci
      - name: Verify source
        run: npm run check
      - name: Verify dependency licenses
        run: npm run license:check
      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(npm pkg get version | tr -d '"')
          test "v${PACKAGE_VERSION}" = "${GITHUB_REF_NAME}"
      - name: Build package archive
        run: npm pack --ignore-scripts
      - name: Create SHA-256 checksum
        run: |
          CHECKSUM="oss-evidence-${GITHUB_REF_NAME#v}.tgz.sha256"
          shasum -a 256 oss-evidence-*.tgz > "$CHECKSUM"
      - name: Attest package archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: oss-evidence-*.tgz
      - name: Upload package and checksum
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: oss-evidence-${{ github.ref_name }}
          path: |
            oss-evidence-*.tgz
            oss-evidence-*.tgz.sha256
          if-no-files-found: error
          retention-days: 30
